<div style="font-family: 'Courier New', monospace; max-width: 450px; margin-bottom: 40px; color: #333;">
  <div style="margin-bottom: 10px;">
    <span style="font-size: 1.1em; font-weight: bold; display: block; letter-spacing: 1px;">DIGITAL FORENSICS</span>
    <span style="color: #2ecc71; font-weight: bold;">[ FOUNDATIONAL ]</span>
    <span style="color: #bbb;"> ◦ Competent ◦ Advanced ◦ Expert</span>
  </div>

  <div style="position: relative; width: 100%; height: 30px;">
    <!-- The Scale Line -->
    <div style="position: absolute; top: 15px; width: 100%; height: 2px; background: #ddd;"></div>
    
    <!-- The Active Progress Line -->
    <div style="position: absolute; top: 15px; width: 12%; height: 2px; background: #2ecc71;"></div>

    <!-- The Triangle Pointer (▲) -->
    <div style="position: absolute; left: 12%; top: 5px; transform: translateX(-50%); color: #2ecc71; font-size: 20px; text-shadow: 0 0 5px rgba(46,204,113,0.5);">
      ▲
    </div>

    <!-- Background Milestones (Circles) -->
    <div style="position: absolute; left: 37%; top: 11px; width: 8px; height: 8px; background: #fff; border: 2px solid #ddd; border-radius: 50%;"></div>
    <div style="position: absolute; left: 63%; top: 11px; width: 8px; height: 8px; background: #fff; border: 2px solid #ddd; border-radius: 50%;"></div>
    <div style="position: absolute; left: 90%; top: 11px; width: 8px; height: 8px; background: #fff; border: 2px solid #ddd; border-radius: 50%;"></div>
  </div>
</div>
